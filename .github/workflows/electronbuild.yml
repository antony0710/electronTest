name: Build Electron App

on:
  push:
    branches:
      - main # 当你提交代码到 main 分支时自动触发
  workflow_dispatch: # 允许你在 GitHub Actions 页面手动点击 "Run workflow" 按钮

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: electronuserland/builder:wine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Build
        env:
          HOME: /tmp/electron-builder-home
          XDG_CONFIG_HOME: /tmp/electron-builder-home/.config
          WINEPREFIX: /tmp/electron-builder-home/.wine
        run: |
          mkdir -p "$HOME" "$XDG_CONFIG_HOME" "$WINEPREFIX"
          npm install
          npm run build
          # 明确指定目标平台和架构
          npx electron-builder --win --x64
      - name: Publish Build To GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Windows Build ${{ github.run_number }}
          files: dist/*.exe
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
